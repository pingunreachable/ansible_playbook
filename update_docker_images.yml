---
- name: Update ubtserver-networkmgmt containers to latest image
  hosts: ubtserver_networkmgmt
  gather_facts: false
  connection: ssh
  become: true

  tasks:
    - name: Pull and start latest docker images
      community.docker.docker_compose_v2:
        project_src: "{{ item }}"
        pull: always
        state: present
      register: output
      loop:
         - portainer
         - pihole
         - unifi-controller

    - name: Show results of starting services
      ansible.builtin.debug:
        var: output

- name: Update ubtserver-media containers to latest image
  hosts: ubtserver_media
  gather_facts: false
  connection: ssh
  become: true

  tasks:
    - name: Pull and start latest docker images
      community.docker.docker_compose_v2:
        project_src: "{{ item }}"
        pull: always
        state: present
      register: output
      loop:
         - firefox
         - jellyfin
         - qbittorrent
         - downloadsbox

    - name: Show results of starting services
      ansible.builtin.debug:
        var: output