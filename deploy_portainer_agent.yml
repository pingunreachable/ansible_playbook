---
- name: Depoly portainer agent
  hosts: initial_setup_server
  gather_facts: true
  become: yes
  become_method: sudo
  connection: ssh

  tasks:
    - name: Copy portainer agent compose files to target
      ansible.builtin.copy:
        src: /var/lib/semaphore/portainer_agent/docker-compose.yml
        dest: /home/ubtsvradmin/portainer_agent
        owner: ubtsvradmin
        group: ubtsvradmin
        directory_mode: '0775'
        mode: '0775'

    - name: Pull and start latest portainer agent docker images
      community.docker.docker_compose_v2:
        project_src: portainer_agent
        pull: always
        state: present
      register: output

    - name: Show results of starting services
      ansible.builtin.debug:
        var: output  